schema: spec-driven
strict_tdd: true
context: |
  gentle-pi is a Node.js 24/TypeScript ESM Pi extension package managed with pnpm 11.
  Architecture: extensions are runtime entry points, lib contains reusable logic, and assets/prompts/skills are packaged contracts.
  Conventions: explicit .ts ESM imports, node: built-ins, tabs, double quotes, and semicolons.
  Testing: node:test unit tests plus a custom Pi extension runtime harness; pnpm test runs both layers.
  Quality: no dedicated lint, formatter, typecheck, coverage, or build command is configured.
  CI: GitHub Actions runs pnpm test and package-content verification on Node.js 24.
  SDD: OpenSpec file artifacts with strict TDD and pnpm test as the verification command.
rules:
  proposal:
    require_problem_statement: true
  spec:
    require_acceptance_criteria: true
  design:
    require_tradeoffs: true
  tasks:
    protect_review_workload: true
  apply:
    test_command: "pnpm test"
  verify:
    test_command: "pnpm test"
    build_command: ""
    coverage_threshold: 0
  archive:
    warn_before_destructive_deltas: true
testing:
  detected: "2026-07-10"
  runner:
    command: "pnpm test"
    framework: "node:test plus custom Pi extension runtime harness"
  layers:
    unit: "node:test"
    integration: "custom Pi extension runtime harness"
    e2e: ""
  commands:
    unit:
      - scope: "."
        command: "node --experimental-strip-types --test tests/*.test.ts"
        framework: "node:test"
    integration:
      - scope: "."
        command: "pnpm run test:harness"
        framework: "custom Pi extension runtime harness"
    e2e: []
  coverage:
    command: ""
    commands: []
quality:
  lint: ""
  lint_commands: []
  typecheck: ""
  typecheck_commands: []
  format: ""
  format_commands: []
